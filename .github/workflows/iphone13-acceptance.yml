name: iPhone 13 Acceptance

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  iphone13-acceptance:
    name: iPhone 13 / iOS 18 acceptance
    runs-on: macos-15
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          set -euo pipefail
          if [ -d /Applications/Xcode_16.4.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.3.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.2.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.1.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer
          elif [ -d /Applications/Xcode_16.app ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          elif [ -d /Applications/Xcode.app ]; then
            sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          fi
          xcodebuild -version
          xcrun --find simctl

      - name: Show simulator support
        run: |
          set -euo pipefail
          xcrun simctl list devicetypes | grep "iPhone 13" || true
          xcrun simctl list runtimes available | grep "iOS 18" || true
          xcrun simctl list devices available | grep "iPhone 13" || true
          xcrun simctl list runtimes | grep "iOS" || true

      - name: Run local offline validation
        run: Tools/validate_local.sh

      - name: Run iPhone 13 acceptance tests
        env:
          QA_EVIDENCE_DIR: ${{ github.workspace }}/QA_Evidence/iPhone13
        run: Tools/run_iphone13_acceptance.sh

      - name: Upload iPhone 13 QA evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iphone13-qa-evidence
          path: QA_Evidence
          if-no-files-found: warn
